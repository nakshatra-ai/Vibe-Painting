<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Canvas Pro - Web Edition</title>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-container" class="mode-shared">
    <!-- Camera stream container (hidden, processed in JS) -->
    <video id="webcam" autoplay playsinline muted></video>
    
    <!-- Main Drawing Canvas -->
    <canvas id="canvas"></canvas>

    <!-- Top Toolbar overlay -->
    <header class="glass-bar top-bar">
      <!-- SHARED MODE TOOLBAR -->
      <div class="toolbar-dock shared-dock">
        <div class="btn-group colors-group">
          <button class="btn btn-color red active" data-type="color" data-val="#FF0000" data-label="RED"></button>
          <button class="btn btn-color green" data-type="color" data-val="#00FF00" data-label="GREEN"></button>
          <button class="btn btn-color blue" data-type="color" data-val="#0000FF" data-label="BLUE"></button>
          <button class="btn btn-color yellow" data-type="color" data-val="#FFFF00" data-label="YELLOW"></button>
        </div>
        <div class="divider"></div>
        <button class="btn btn-action" data-type="toggle" data-val="eraser" data-label="ERASER">ERASER</button>
        <button class="btn btn-action" data-type="action" data-val="undo" data-label="UNDO">UNDO</button>
        <button class="btn btn-action" data-type="action" data-val="redo" data-label="REDO">REDO</button>
        <button class="btn btn-action" data-type="action" data-val="clear" data-label="CLEAR">CLEAR</button>
        <div class="divider"></div>
        <button class="btn btn-action accent-btn" data-type="action" data-val="toggle_mode" data-label="SPLIT MODE">SPLIT MODE</button>
        <button class="btn btn-action" data-type="action" data-val="fullscreen" data-label="FULLSCREEN">FULLSCREEN</button>
        <button class="btn btn-action danger-btn" data-type="action" data-val="exit" data-label="EXIT">EXIT</button>
      </div>

      <!-- SPLIT MODE TOOLBAR -->
      <div class="toolbar-dock split-dock">
        <!-- PLAYER 1 (Left Hand controls) -->
        <div class="player-dock p1-dock" data-player="Left">
          <button class="btn btn-color red active" data-type="color" data-val="#FF0000" data-player="Left" data-label="RED"></button>
          <button class="btn btn-color green" data-type="color" data-val="#00FF00" data-player="Left" data-label="GREEN"></button>
          <button class="btn btn-color blue" data-type="color" data-val="#0000FF" data-player="Left" data-label="BLUE"></button>
          <button class="btn btn-color yellow" data-type="color" data-val="#FFFF00" data-player="Left" data-label="YELLOW"></button>
          <div class="divider"></div>
          <button class="btn btn-action" data-type="toggle" data-val="eraser" data-player="Left" data-label="ERASER">ERASER</button>
          <button class="btn btn-action" data-type="action" data-val="undo" data-player="Left" data-label="UNDO">UNDO</button>
          <button class="btn btn-action" data-type="action" data-val="redo" data-player="Left" data-label="REDO">REDO</button>
          <button class="btn btn-action" data-type="action" data-val="clear" data-player="Left" data-label="CLEAR">CLEAR</button>
          <div class="divider"></div>
          <button class="btn btn-action accent-btn" data-type="action" data-val="toggle_mode" data-player="Left" data-label="SHARED">SHARED</button>
          <button class="btn btn-action" data-type="action" data-val="fullscreen" data-player="Left" data-label="FS">FS</button>
          <button class="btn btn-action danger-btn" data-type="action" data-val="exit" data-player="Left" data-label="EXIT">EXIT</button>
        </div>

        <!-- Center gap indicator for split line -->
        <div class="split-gap"></div>

        <!-- PLAYER 2 (Right Hand controls) -->
        <div class="player-dock p2-dock" data-player="Right">
          <button class="btn btn-action danger-btn" data-type="action" data-val="exit" data-player="Right" data-label="EXIT">EXIT</button>
          <button class="btn btn-action" data-type="action" data-val="fullscreen" data-player="Right" data-label="FS">FS</button>
          <button class="btn btn-action accent-btn" data-type="action" data-val="toggle_mode" data-player="Right" data-label="SHARED">SHARED</button>
          <div class="divider"></div>
          <button class="btn btn-color red" data-type="color" data-val="#FF0000" data-player="Right" data-label="RED"></button>
          <button class="btn btn-color green" data-type="color" data-val="#00FF00" data-player="Right" data-label="GREEN"></button>
          <button class="btn btn-color blue active" data-type="color" data-val="#0000FF" data-player="Right" data-label="BLUE"></button>
          <button class="btn btn-color yellow" data-type="color" data-val="#FFFF00" data-player="Right" data-label="YELLOW"></button>
          <div class="divider"></div>
          <button class="btn btn-action" data-type="toggle" data-val="eraser" data-player="Right" data-label="ERASER">ERASER</button>
          <button class="btn btn-action" data-type="action" data-val="undo" data-player="Right" data-label="UNDO">UNDO</button>
          <button class="btn btn-action" data-type="action" data-val="redo" data-player="Right" data-label="REDO">REDO</button>
          <button class="btn btn-action" data-type="action" data-val="clear" data-player="Right" data-label="CLEAR">CLEAR</button>
        </div>
      </div>
    </header>

    <!-- Bottom Status Panel overlay -->
    <footer class="glass-bar bottom-bar">
      <!-- SHARED MODE FOOTER -->
      <div class="footer-dock shared-footer">
        <div class="telemetry">
          <span class="label">L-Hand:</span>
          <span class="value" id="l-state-shared">PAUSE MODE</span>
          <span class="label margin-l">R-Hand:</span>
          <span class="value" id="r-state-shared">PAUSE MODE</span>
          <span class="label margin-l">Tool:</span>
          <span class="value active-tool-name" id="tool-shared">Brush</span>
        </div>
        <div class="slider-container">
          <span class="label">Size: <span id="size-val-shared">10</span>px</span>
          <input type="range" class="size-slider" id="slider-shared" min="2" max="50" value="10">
        </div>
      </div>

      <!-- SPLIT MODE FOOTER -->
      <div class="footer-dock split-footer">
        <!-- PLAYER 1 (Left Side status) -->
        <div class="player-footer p1-footer">
          <div class="telemetry">
            <span class="label text-p1">P1 Hand:</span>
            <span class="value" id="l-state-split">PAUSE MODE</span>
          </div>
          <div class="slider-container">
            <span class="label">Size: <span id="size-val-p1">10</span>px</span>
            <input type="range" class="size-slider slider-p1" id="slider-p1" min="2" max="50" value="10">
          </div>
        </div>

        <div class="footer-divider"></div>

        <!-- PLAYER 2 (Right Side status) -->
        <div class="player-footer p2-footer">
          <div class="telemetry">
            <span class="label text-p2">P2 Hand:</span>
            <span class="value" id="r-state-split">PAUSE MODE</span>
          </div>
          <div class="slider-container">
            <span class="label">Size: <span id="size-val-p2">10</span>px</span>
            <input type="range" class="size-slider slider-p2" id="slider-p2" min="2" max="50" value="10">
          </div>
        </div>
      </div>
    </footer>
  </div>

  <!-- App Logic Module (ES Module) -->
  <script type="module" src="app.js"></script>
</body>
</html>
